<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tilt Food Cards</title>
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet-->
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="diet.png" />
  </head>
  <body>
    <div class="card-container">
      <div class="card">
        <img src="pasta.png" />
        <div class="content">
          <h3 class="title">Pasta Primavera</h3>
          <p class="description">
            Fresh pasta with seasonal vegetables and Parmesan
          </p>
          <p class="price">$12.99</p>
        </div>
      </div>

      <div class="card">
        <img src="salad.png" />
        <div class="content">
          <h3 class="title">Caesar Salad</h3>
          <p class="description">Crisp lettuce,croutons and Caesar dressing</p>
          <p class="price">$7.99</p>
        </div>
      </div>

      <div class="card">
        <img src="pizza-3.png" />
        <div class="content">
          <h3 class="title">Margherita Pizza</h3>
          <p class="description">
            Classic Pizza with mozzarella,tomatoes and basil
          </p>
          <p class="price">$9.99</p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
